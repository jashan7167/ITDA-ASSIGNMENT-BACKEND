# Server
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/video_conference}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:EnLEhpkaqtQJ7qLP8aVr8j3alvnooBDVL6bw3BIKJFshbyLavg3zQo+dVhyKyQCTqIs0NHBG2Rxrqt08BV+Uog==}
jwt.expiration=${JWT_EXPIRATION:86400000}

# WebSocket
spring.websocket.enabled=true

# Logging
logging.level.root=INFO
logging.level.com.itda=DEBUG
